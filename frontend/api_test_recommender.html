<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Recommender - Association Rules</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 600px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .tag {
            display: inline-block;
            background-color: #e0e0e0;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 3px;
        }
        #cartItems, #recommendations {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        .recommendation {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<h2>🛒 Product Recommender</h2>
<p>Add items to your cart and get personalized recommendations!</p>

<form id="recommendForm">
    <label for="cartInput">Add item to cart:</label>
    <input type="text" id="cartInput" placeholder="e.g., whole milk, yogurt, bread">
    
    <button type="button" onclick="addToCart()">Add Item</button>
    <button type="submit" style="background-color: #FF9800;">Get Recommendations</button>
    <button type="button" onclick="clearCart()" style="background-color: #f44336;">Clear Cart</button>
</form>

<div id="cartItems">
    <h3>Your Cart:</h3>
    <div id="cartList">Empty</div>
</div>

<div id="recommendations" style="display:none;">
    <h3>Recommended Products:</h3>
    <div id="recommendList"></div>
</div>

<script>
    let cart = [];

    function addToCart() {
        const item = document.getElementById('cartInput').value.trim();
        if (item && !cart.includes(item)) {
            cart.push(item);
            updateCartDisplay();
            document.getElementById('cartInput').value = '';
        }
    }

    function clearCart() {
        cart = [];
        updateCartDisplay();
        document.getElementById('recommendations').style.display = 'none';
    }

    function updateCartDisplay() {
        const cartList = document.getElementById('cartList');
        if (cart.length === 0) {
            cartList.innerHTML = 'Empty';
        } else {
            cartList.innerHTML = cart.map(item => 
                `<span class="tag">${item} <button onclick="removeItem('${item}')" style="background:none;border:none;color:red;cursor:pointer;">✕</button></span>`
            ).join('');
        }
    }

    function removeItem(item) {
        cart = cart.filter(i => i !== item);
        updateCartDisplay();
    }

    document.getElementById('recommendForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        if (cart.length === 0) {
            alert('Please add at least one item to your cart!');
            return;
        }

        const data = { cart: cart };

        try {
            const response = await fetch('https://refactored-carnival-56jrvpj6q96fpxq9-5000.app.github.dev/api/v1/models/recommender/predictions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            const recommendDiv = document.getElementById('recommendations');
            const recommendList = document.getElementById('recommendList');
            
            if (result.recommendations && result.recommendations.length > 0) {
                recommendList.innerHTML = result.recommendations.map(item => 
                    `<div class="recommendation">🎯 ${item}</div>`
                ).join('');
                recommendDiv.style.display = 'block';
            } else {
                recommendList.innerHTML = '<p>No recommendations available for these items.</p>';
                recommendDiv.style.display = 'block';
            }

        } catch (error) {
            console.error('Error:', error);
            alert('Error getting recommendations!');
        }
    });

    // Allow adding items by pressing Enter
    document.getElementById('cartInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addToCart();
        }
    });
</script>

</body>
</html>
