<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Cluster Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 500px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #9C27B0;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        .cluster-info {
            font-size: 24px;
            font-weight: bold;
            color: #9C27B0;
            margin: 10px 0;
        }
        .description {
            font-size: 18px;
            color: #555;
            margin: 10px 0;
        }
        .input-info {
            font-size: 14px;
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>👥 Customer Cluster Predictor</h2>
<p>Enter customer information to predict their spending cluster</p>

<form id="predictForm">
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" value="35" min="18" max="100" required>

    <label for="annual_income">Annual Income (thousands):</label>
    <input type="number" id="annual_income" name="annual_income" value="70" min="0" required>

    <label for="spending_score">Spending Score (1-100):</label>
    <input type="number" id="spending_score" name="spending_score" value="60" min="1" max="100" required>

    <button type="submit">Predict Cluster</button>
</form>

<div id="result" style="display:none;"></div>

<script>
    document.getElementById('predictForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const age = parseInt(document.getElementById('age').value);
        const annual_income = parseFloat(document.getElementById('annual_income').value);
        const spending_score = parseFloat(document.getElementById('spending_score').value);

        const data = {
            age: age,
            annual_income: annual_income,
            spending_score: spending_score
        };

        try {
            const response = await fetch('https://refactored-carnival-56jrvpj6q96fpxq9-5000.app.github.dev/api/v1/models/cluster-predictor/predictions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="cluster-info">🎯 Cluster ${result.predicted_cluster}</div>
                <div class="description">${result.cluster_description}</div>
                <div class="input-info">
                    <strong>Customer Profile:</strong><br>
                    Age: ${result.input_features.age}<br>
                    Annual Income: $${result.input_features.annual_income}k<br>
                    Spending Score: ${result.input_features.spending_score}/100
                </div>
            `;
            resultDiv.style.display = 'block';

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('result').innerHTML = 
                '<p style="color:red;"> Error occurred while making prediction.</p>';
            document.getElementById('result').style.display = 'block';
        }
    });
</script>

</body>
</html>
